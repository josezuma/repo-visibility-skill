name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Self-audit
        run: |
          pip install requests
          python scripts/audit_repo.py josezuma/repo-visibility-skill
          python3 -c "import json; d=json.load(open('audit_result.json')); print(f'Score: {d[\"total_score\"]}/100')"
